server:
  port: 8080

  servlet:
    context-path: /api/v1

spring:
  application:
    name: edusysproapi

  #profiles:
    #active: [postgres, flyway, GMail, RabbitMQ]

  #REST config
  data:
    rest:
      base-path: /api/v1

  #DB config
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: 'jdbc:${DB_DBMS:mysql}://${DB_SERVER:localhost}:${DB_PORT:3306}/${DB_DATABASE_NAME:academic}'
    username: '${DB_USERNAME:root}'
    password: '${DB_PASSWORD:password}'

  #JPA config
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true

  #flyway config
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: true

  #Mail config
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 15000
          writetimeout: 15000
        debug: true

  #RabbitMQ config
  rabbitmq:
    host: ${AMQ_HOST}
    port: ${AMQ_PORT}
    username: ${AMQ_USERNAME}
    password: ${AMQ_PASSWORD}
    virtual-host: ${AMQ_VH}

#JWT Settings
---
jwt:
  secret: ${SECRET:mySecretKey12345678901234567890123456789012}
  expiration: ${EXP:86400000}
  refresh:
    expiration: ${REF_EXP:604800000}

app:
  db-type: mysql
  mail:
    from: "Edusyspro"
    queue:
      exchange: ${MAIL_EXCHANGE:mail.exchange}
      queue: ${MAIL_QUEUE:mail.queue}
      routing-key: ${MAIL_ROT_QUEUE:mail.send}

ui:
  url: ${URL:'http://localhost:3000;http://localhost:5173'}
  email-base-url: ${MAIL_URL:http://localhost:5173}
